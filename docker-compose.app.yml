services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-claw-gateway-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "apps.gateway.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-claw-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gateway:
        condition: service_started
    command: ["uv", "run", "python", "scripts/worker_loop.py"]

  node-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-claw-node-runner
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "apps.node_runner.main:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "8010:8010"
